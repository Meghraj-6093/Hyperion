# Secrets Scan — prevent accidental credential leaks
#
# Scans every push and PR for accidentally committed secrets, API keys,
# tokens, private keys, and other sensitive strings.
# Runs in parallel with the main CI.
#
# Uses Gitleaks (industry-standard open-source scanner) plus a custom
# grep pass for high-confidence patterns.

name: Secrets Scan

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

jobs:
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GL_VERSION="8.24.3"
          curl -sLO "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GL_VERSION}_linux_x64.tar.gz" -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks detect --source . --no-git -v 2>&1 | tee gitleaks-output.txt
          if grep -q "leaks found" gitleaks-output.txt; then
            echo "leak_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "leak_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report Gitleaks results
        if: always()
        run: |
          if [ "${{ steps.gitleaks.outputs.leak_found }}" = "true" ]; then
            echo "⚠️  Gitleaks found potential secrets. See logs above."
          else
            echo "✅ No secrets detected by Gitleaks."
          fi

  grep-scan:
    name: High-confidence pattern check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan tracked files for secret patterns
        run: |
          ISSUES=0
          TRACKED=$(git ls-files | grep -v 'node_modules/' | grep -v '\.github/' || true)

          echo "::group::🔍 Checking tracked .env files..."

          # .env files that are tracked by git (DISASTER if any — but .env.example is OK)
          TRACKED_ENV=$(git ls-files | grep -E '\.env$|\.env\.(local|dev|prod|staging|production|development)' || true)
          if [ -n "$TRACKED_ENV" ]; then
            echo "❌ CRITICAL: .env files found in git tracking:"
            echo "$TRACKED_ENV"
            ISSUES=$((ISSUES + 1))
          else
            echo "✅ No .env files tracked."
          fi

          echo "::endgroup::"
          echo "::group::🔍 Checking for hardcoded secrets..."

          # High-confidence patterns
          SECRET_PATTERNS=(
            '-----BEGIN (RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'
            'CLERK_SECRET_KEY=[Ss][Kk]_'
            'STRIPE_SECRET_KEY=sk_'
            'AWS_SECRET_ACCESS_KEY'
            'GH_TOKEN=|GITHUB_TOKEN=|GITLAB_TOKEN'
            'NPM_TOKEN=|NODE_AUTH_TOKEN'
            'SUPABASE_SERVICE_KEY=|SUPABASE_SECRET_KEY'
            'DATABASE_URL=(postgres|mysql|mongodb|redis)://[^:]+:[^@]+@'
            'password\s*[:=]\s*['"'"'"][^'"'"'"]+['"'"'"]'
            'api[_-]?key\s*[:=]\s*['"'"'"][A-Za-z0-9_\-]{24,}['"'"'"]'
          )

          for pattern in "${SECRET_PATTERNS[@]}"; do
            MATCHES=$(echo "$TRACKED" | xargs grep -l -E "$pattern" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "❌ Pattern matched: ${pattern}"
              echo "$MATCHES" | head -10
              ISSUES=$((ISSUES + 1))
            fi
          done

          echo "::endgroup::"

          if [ "$ISSUES" -gt 0 ]; then
            echo ""
            echo "❌❌❌ $ISSUES potential secret leak(s) detected!"
            echo ""
            echo "🛡️  If these are false positives:"
            echo "    - Mark the line with // gitleaks:allow"
            echo "    - Or add the path to .gitleaks.toml"
            echo ""
            echo "💀 Never commit real credentials to git."
            echo "   They stay in .env.local (already in .gitignore)."
            exit 1
          fi
